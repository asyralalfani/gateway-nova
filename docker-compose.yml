# docker-compose.yml
# Setup production sederhana untuk Gateway Nova
#
# Cara pakai:
#   docker compose up -d           # jalankan
#   docker compose logs -f         # lihat logs
#   docker compose pull && docker compose up -d  # update
#
# Catatan port:
#   Port di host diatur lewat .env (APP_PORT, POSTGRES_PORT) supaya bisa hidup
#   berdampingan dengan service lain di server. Port internal container tetap
#   default (3000 untuk app, 5432 untuk postgres) karena traffic antar service
#   lewat docker network — tidak bentrok dengan host.

services:
  db:
    image: postgres:16-alpine
    container_name: gateway-nova-db
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-homepage}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-homepage}
      - POSTGRES_DB=${POSTGRES_DB:-homepage}

    volumes:
      # Data PostgreSQL (penting: backup folder ini)
      - ./data/postgres:/var/lib/postgresql/data

    # Bind hanya ke 127.0.0.1 supaya tidak terekspos publik di production.
    # Tetap bisa diakses dari host untuk pnpm prisma migrate dev / prisma studio.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homepage} -d ${POSTGRES_DB:-homepage}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateway-nova:latest
    container_name: gateway-nova
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${APP_PORT:-3100}:3000"

    environment:
      - NODE_ENV=production
      # App konek ke db lewat docker network → host = "db", port internal 5432.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-homepage}:${POSTGRES_PASSWORD:-homepage}@db:5432/${POSTGRES_DB:-homepage}?schema=public
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100}

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits (sesuaikan dengan server)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ====== OPSIONAL: Backup service ======
  # Uncomment jika mau backup otomatis ke folder backups/
  #
  # backup:
  #   image: postgres:16-alpine
  #   container_name: gateway-nova-backup
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     - PGPASSWORD=${POSTGRES_PASSWORD:-homepage}
  #   volumes:
  #     - ./backups:/backups
  #   entrypoint: ["sh", "-c"]
  #   command: >
  #     "while true; do
  #        pg_dump -h db -U ${POSTGRES_USER:-homepage} -d ${POSTGRES_DB:-homepage} \
  #          -F c -f /backups/homepage-$$(date +%Y%m%d-%H%M%S).dump;
  #        find /backups -name 'homepage-*.dump' -mtime +30 -delete;
  #        sleep 86400;
  #      done"

networks:
  default:
    name: gateway-nova-network

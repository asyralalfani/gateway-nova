# docker-compose.yml
# Simple production setup for Gateway Nova
#
# Usage:
#   docker compose up -d           # run
#   docker compose logs -f         # tail logs
#   docker compose pull && docker compose up -d  # update
#
# Port notes:
#   Host ports come from .env (APP_PORT, POSTGRES_PORT) so this can coexist
#   with other services on the host. Internal container ports stay at the
#   defaults (3000 for the app, 5432 for postgres) because inter-service
#   traffic goes over the docker network — no host port collision.

services:
  db:
    image: postgres:16-alpine
    container_name: gateway-nova-db
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-homepage}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-homepage}
      - POSTGRES_DB=${POSTGRES_DB:-homepage}

    volumes:
      # PostgreSQL data (important: back this folder up)
      - ./data/postgres:/var/lib/postgresql/data

    # Bind to 127.0.0.1 only so the port isn't exposed publicly in production.
    # Still reachable from the host for pnpm prisma migrate dev / prisma studio.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homepage} -d ${POSTGRES_DB:-homepage}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateway-nova:latest
    container_name: gateway-nova
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "${APP_PORT:-3100}:3000"

    environment:
      - NODE_ENV=production
      # App talks to db over the docker network → host = "db", internal port 5432.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-homepage}:${POSTGRES_PASSWORD:-homepage}@db:5432/${POSTGRES_DB:-homepage}?schema=public
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100}
      # The /api/ping/run endpoint checks PING_SECRET to authenticate the pinger.
      - PING_ENABLED=${PING_ENABLED:-true}
      - PING_SECRET=${PING_SECRET:-}
      - PING_TIMEOUT_MS=${PING_TIMEOUT_MS:-5000}

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits (tune for your server)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ====== Pinger: poll tool URLs and update status ======
  # Only runs when PING_SECRET is set in .env. Without the secret the loop
  # gets a 401 from the API and is effectively a no-op.
  pinger:
    image: curlimages/curl:8.10.1
    container_name: gateway-nova-pinger
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - PING_SECRET=${PING_SECRET:-}
      - PING_INTERVAL_SECONDS=${PING_INTERVAL_SECONDS:-300}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -z "$$PING_SECRET" ]; then
          echo "PING_SECRET not set — pinger idle. Set it in .env to enable.";
          while true; do sleep 3600; done
        fi
        echo "▶ Pinger started (interval: $${PING_INTERVAL_SECONDS}s)";
        while true; do
          curl -fsS -X POST \
            -H "Authorization: Bearer $$PING_SECRET" \
            -H "Content-Type: application/json" \
            http://app:3000/api/ping/run || echo "  ! ping run failed";
          sleep "$$PING_INTERVAL_SECONDS";
        done

  # ====== OPTIONAL: Backup service ======
  # Uncomment to enable automatic backups to the backups/ folder.
  #
  # backup:
  #   image: postgres:16-alpine
  #   container_name: gateway-nova-backup
  #   restart: unless-stopped
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     - PGPASSWORD=${POSTGRES_PASSWORD:-homepage}
  #   volumes:
  #     - ./backups:/backups
  #   entrypoint: ["sh", "-c"]
  #   command: >
  #     "while true; do
  #        pg_dump -h db -U ${POSTGRES_USER:-homepage} -d ${POSTGRES_DB:-homepage} \
  #          -F c -f /backups/homepage-$$(date +%Y%m%d-%H%M%S).dump;
  #        find /backups -name 'homepage-*.dump' -mtime +30 -delete;
  #        sleep 86400;
  #      done"

networks:
  default:
    name: gateway-nova-network
